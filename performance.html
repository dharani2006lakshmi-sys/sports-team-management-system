<!DOCTYPE html>
<html>
<head>
<title>Player Performance</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f6f9;
}

/* HEADER */

.header{
background:#2563eb;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.back-btn{
background:white;
color:#2563eb;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.back-btn:hover{
background:#e5e7eb;
}

/* CONTENT */

.container{
padding:40px;
}

h2{
text-align:center;
margin-bottom:30px;
}

/* TABLE */

table{
width:80%;
margin:auto;
border-collapse:collapse;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

th{
background:#f97316;
color:white;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f9fafb;
}

</style>

</head>

<body>

<div class="header">

<button class="back-btn" onclick="location.href='player-dashboard.html'">
⬅ Back
</button>

<h3>Player Performance</h3>

</div>

<div class="container">

<h2>Performance Statistics</h2>

<table>

<tr>
<th>Player</th>
<th>Goals</th>
<th>Assists</th>
<th>Rating</th>
</tr>

<tr>
<td>Player 1</td>
<td>2</td>
<td>1</td>
<td>8.5</td>
</tr>

<tr>
<td>Player 2</td>
<td>1</td>
<td>0</td>
<td>7.2</td>
</tr>

<tr>
<td>Player 3</td>
<td>3</td>
<td>2</td>
<td>9.0</td>
</tr>

</table>

</div>

</body>
</html>
