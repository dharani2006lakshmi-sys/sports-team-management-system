<!DOCTYPE html>
<html>
<head>
<title>Register - Sports Team System</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1e3a8a,#2563eb);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.register-box{
background:white;
padding:40px;
width:380px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#1e3a8a;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

</style>

</head>

<body>

<div class="register-box">

<h2>Create Account</h2>

<input type="text" placeholder="Full Name">

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<select>
<option>Select Role</option>
<option>Player</option>
<option>Coach</option>
</select>

<button onclick="register()">Register</button>

<p style="margin-top:10px">
Already have account?
<a href="login.html">Login</a>
</p>

</div>

<script>

function register(){
alert("Account Created Successfully!");
window.location="login.html";
}

</script>

</body>
</html>
