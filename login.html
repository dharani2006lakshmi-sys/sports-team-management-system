<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>New user? <a href="register.html">Create Account</a></p>

</div>

<script>

function login(){

let storedUser = JSON.parse(localStorage.getItem("user"));

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

if(storedUser && username == storedUser.username && password == storedUser.password){

if(storedUser.role == "player"){
window.location="player-dashboard.html";
}
else{
window.location="coach-dashboard.html";
}

}
else{
alert("Invalid Username or Password");
}

}

</script>

</body>
</html>
