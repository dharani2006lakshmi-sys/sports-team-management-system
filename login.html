<!DOCTYPE html>
<html>
<head>
<title>Sports Team Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
}

/* LOGIN CARD */

.login-container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:40px;
width:380px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
color:white;
text-align:center;
}

.login-container h2{
margin-bottom:25px;
font-size:26px;
}

/* INPUTS */

.input-box{
margin:15px 0;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:6px;
outline:none;
}

/* ROLE BUTTONS */

.role-select{
display:flex;
gap:10px;
margin:20px 0;
}

.role{
flex:1;
padding:12px;
background:rgba(255,255,255,0.2);
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.role:hover{
background:#2563eb;
}

.active{
background:#2563eb;
}

/* LOGIN BUTTON */

.login-btn{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

.login-btn:hover{
background:#16a34a;
}

</style>

</head>

<body>

<div class="login-container">

<h2>Sports Team Login</h2>

<div class="input-box">
<input type="text" placeholder="Username">
</div>

<div class="input-box">
<input type="password" placeholder="Password">
</div>

<div class="role-select">

<div class="role" id="player" onclick="selectRole('player')">
⚽ Player
</div>

<div class="role" id="coach" onclick="selectRole('coach')">
🏆 Coach
</div>

</div>

<button class="login-btn" onclick="login()">Login</button>

</div>

<script>

let role="";

function selectRole(r){

role=r;

document.getElementById("player").classList.remove("active");
document.getElementById("coach").classList.remove("active");

document.getElementById(r).classList.add("active");

}

function login(){

if(role==""){
alert("Select Player or Coach");
return;
}

if(role=="player"){
window.location="player-dashboard.html";
}
else{
window.location="coach-dashboard.html";
}

}

</script>

</body>
</html>
