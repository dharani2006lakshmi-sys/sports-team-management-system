<!DOCTYPE html>
<html>
<head>
<title>Login - Sports System</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

.link{
margin-top:15px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Sports Team Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<br>

<label>
<input type="radio" name="role" value="player" checked>
Player
</label>

<br>

<label>
<input type="radio" name="role" value="coach">
Coach
</label>

<br><br>

<button onclick="login()">Login</button>

<div class="link">
<p>New user? <a href="register.html">Create Account</a></p>
</div>

</div>

<script>

function login(){

let storedUser = JSON.parse(localStorage.getItem("user"));

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

if(storedUser && username === storedUser.username && password === storedUser.password){

if(storedUser.role === "player"){
window.location="player-dashboard.html";
}
else{
window.location="coach-dashboard.html";
}

}
else{
alert("Invalid username or password");
}

}

</script>

</body>
</html>
