<!DOCTYPE html>
<html>
<head>
<title>Login - Sports System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
}

.login-box{
background:white;
padding:40px;
width:380px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#1e3a8a;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

.role-container{
display:flex;
gap:15px;
margin:20px 0;
}

.role{
flex:1;
padding:15px;
border:2px solid #ddd;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.role:hover{
border-color:#2563eb;
background:#eef2ff;
}

.role.active{
border-color:#2563eb;
background:#eef2ff;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Sports Team Login</h2>

<input type="text" placeholder="Username">
<input type="password" placeholder="Password">

<div class="role-container">

<div class="role" onclick="selectRole('player')" id="player">
👤 Player
</div>

<div class="role" onclick="selectRole('coach')" id="coach">
🏅 Coach
</div>

</div>

<button onclick="login()">Login</button>

</div>

<script>

let selectedRole="";

function selectRole(role){

selectedRole=role;

document.getElementById("player").classList.remove("active");
document.getElementById("coach").classList.remove("active");

document.getElementById(role).classList.add("active");

}

function login(){

if(selectedRole==""){
alert("Please select a role");
return;
}

if(selectedRole=="player"){
window.location="player-dashboard.html";
}
else{
window.location="coach-dashboard.html";
}

}

</script>

</body>
</html>
