<!DOCTYPE html>
<html>
<head>
<title>Sports System Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
}

.left{
flex:1;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

.left h1{
font-size:40px;
margin-bottom:20px;
}

.left p{
width:70%;
line-height:1.6;
}

.right{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#f4f6f9;
}

.login-box{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.login-box h2{
margin-bottom:20px;
text-align:center;
color:#1e3a8a;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

.role{
display:flex;
justify-content:space-between;
margin:15px 0;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

</style>

</head>

<body>

<div class="left">
<h1>Sports Team System</h1>
<p>
Manage athlete performance, training schedules, and match statistics
using a modern sports management platform.
</p>
</div>

<div class="right">

<div class="login-box">

<h2>Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<div class="role">
<label>
<input type="radio" name="role"> Player
</label>

<label>
<input type="radio" name="role"> Coach
</label>
</div>

<button onclick="login()">Login</button>

</div>

</div>

<script>

function login(){

let role=document.querySelector('input[name="role"]:checked');

if(!role){
alert("Select Player or Coach");
return;
}

if(role.parentElement.textContent.includes("Player")){
window.location="player-dashboard.html";
}
else{
window.location="coach-dashboard.html";
}

}

</script>

</body>
</html>
