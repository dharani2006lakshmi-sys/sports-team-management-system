<!DOCTYPE html>
<html>
<head>
<title>Login - Sports System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
}

.login-box{
background:white;
padding:40px;
width:350px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

.login-box h2{
margin-bottom:20px;
color:#1e3a8a;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

.role{
margin:15px 0;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

.links{
margin-top:15px;
}

.links a{
text-decoration:none;
color:#2563eb;
font-size:14px;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Sports Team Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<div class="role">
<label>
<input type="radio" name="role"> Player
</label>

<label style="margin-left:15px">
<input type="radio" name="role"> Coach
</label>
</div>

<button onclick="login()">Login</button>

<div class="links">
<a href="#">Forgot password?</a>
</div>

</div>

<script>

function login(){

let role=document.querySelector('input[name="role"]:checked');

if(!role){
alert("Please select Player or Coach");
return;
}

if(role.parentElement.textContent.includes("Player")){
window.location="player-dashboard.html";
}
else{
window.location="coach-dashboard.html";
}

}

</script>

</body>
</html>
