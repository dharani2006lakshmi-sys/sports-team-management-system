<!DOCTYPE html>
<html>

<head>
<title>Player Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
height:100vh;
background:#f4f6f9;
}

/* Sidebar */

.sidebar{
width:220px;
background:#1e3a8a;
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin:10px 0;
border-radius:6px;
}

.sidebar a:hover{
background:#2563eb;
}

/* Main Content */

.main{
flex:1;
padding:30px;
}

/* Top Bar */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.back-btn{
background:#2563eb;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

.back-btn:hover{
background:#1e40af;
}

/* Profile Card */

.profile-card{
background:white;
padding:30px;
width:420px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.profile-card h3{
margin-bottom:15px;
}

.profile-card input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

.save-btn{
margin-top:10px;
padding:10px;
width:100%;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.save-btn:hover{
background:#1e40af;
}

.note{
font-size:12px;
color:#666;
margin-top:8px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h2>Player</h2>

<a href="#">Profile</a>
<a href="login.html">Logout</a>

</div>


<!-- Main Content -->

<div class="main">

<div class="topbar">

<h2>Player Profile</h2>

<button class="back-btn" onclick="history.back()">⬅ Back</button>

</div>


<div class="profile-card">

<h3>Edit Profile</h3>

<input id="name" placeholder="Player Name">
<input id="age" placeholder="Age">
<input id="position" placeholder="Playing Position">
<input id="team" placeholder="Team Name">

<button class="save-btn" onclick="saveProfile()">Save Profile</button>

<p class="note">Profile can be edited only once.</p>

</div>

</div>


<script>

function saveProfile(){

let name=document.getElementById("name").value;

if(name==""){
alert("Please fill all details");
return;
}

alert("Profile saved successfully!");

document.getElementById("name").disabled=true;
document.getElementById("age").disabled=true;
document.getElementById("position").disabled=true;
document.getElementById("team").disabled=true;

}

</script>

</body>
</html>
