<!DOCTYPE html>
<html>
<head>
<title>Player Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.header{
background:#2563eb;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.stats{
display:flex;
gap:20px;
}

.stat{
background:white;
padding:20px;
flex:1;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

</style>

</head>

<body>

<div class="header">
<h2>Player Dashboard</h2>
<a href="login.html" style="color:white">Logout</a>
</div>

<div class="container">

<div class="card">

<h3>Player Profile</h3>

<p><b>Name:</b> <span id="pname"></span></p>
<p><b>Age:</b> <span id="page"></span></p>
<p><b>Position:</b> <span id="pposition"></span></p>
<p><b>Team:</b> <span id="pteam"></span></p>

</div>


<div class="card">

<h3>Training Schedule</h3>
<p>View upcoming training sessions.</p>

</div>


<div class="stats">

<div class="stat">
<h4>Total Matches</h4>
<h2>12</h2>
</div>

<div class="stat">
<h4>Total Goals</h4>
<h2>8</h2>
</div>

<div class="stat">
<h4>Fitness Score</h4>
<h2>92%</h2>
</div>

</div>

</div>

<script>

let user = JSON.parse(localStorage.getItem("user"));

if(user){

document.getElementById("pname").innerText = user.name;
document.getElementById("page").innerText = user.age;
document.getElementById("pposition").innerText = user.position;
document.getElementById("pteam").innerText = user.team;

}

</script>

</body>
</html>
