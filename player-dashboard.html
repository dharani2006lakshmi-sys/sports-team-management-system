<!DOCTYPE html>
<html>
<head>
<title>Player Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
height:100vh;
background:#f4f6f9;
}

/* Sidebar */

.sidebar{
width:220px;
background:#1e3a8a;
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin:10px 0;
border-radius:6px;
}

.sidebar a:hover{
background:#2563eb;
}

/* Main Area */

.main{
flex:1;
padding:30px;
}

/* Topbar */

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:25px;
}

/* Profile Card */

.profile-card{
background:white;
width:420px;
padding:25px;
border-radius:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
margin-bottom:30px;
text-align:center;
}

.profile-img{
width:80px;
height:80px;
border-radius:50%;
margin-bottom:10px;
}

.position{
background:#2563eb;
color:white;
display:inline-block;
padding:4px 12px;
border-radius:20px;
font-size:13px;
margin-bottom:10px;
}

.profile-details{
text-align:left;
margin-top:10px;
}

.profile-details p{
margin:6px 0;
}

.edit-btn{
margin-top:15px;
padding:8px 15px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

.edit-btn:hover{
background:#1e40af;
}

/* Stats */

.stats{
display:flex;
gap:20px;
}

.stat{
background:white;
padding:20px;
flex:1;
text-align:center;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.stat h2{
color:#2563eb;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h2>Player</h2>

<a href="player-dashboard.html">Dashboard</a>
<a href="training.html">Training Schedule</a>
<a href="performance.html">Performance</a>
<a href="injury.html">Injury Status</a>
<a href="login.html">Logout</a>

</div>


<!-- Main -->

<div class="main">

<div class="topbar">

<h2>Player Dashboard</h2>

<p id="welcome"></p>

</div>


<!-- Player Profile -->

<div class="profile-card">

<img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" class="profile-img">

<h2 id="pname">Player Name</h2>

<p class="position" id="pposition">Position</p>

<div class="profile-details">

<p><b>Age:</b> <span id="page"></span></p>

<p><b>Team:</b> <span id="pteam"></span></p>

</div>

<button class="edit-btn">Edit Profile</button>

</div>


<!-- Stats -->

<div class="stats">

<div class="stat">
<h4>Total Matches</h4>
<h2>12</h2>
</div>

<div class="stat">
<h4>Total Goals</h4>
<h2>8</h2>
</div>

<div class="stat">
<h4>Fitness Score</h4>
<h2>92%</h2>
</div>

</div>

</div>


<script>

let user = JSON.parse(localStorage.getItem("user"));

if(user){

document.getElementById("welcome").innerText = "Welcome " + user.name;

document.getElementById("pname").innerText = user.name;

document.getElementById("page").innerText = user.age;

document.getElementById("pposition").innerText = user.position;

document.getElementById("pteam").innerText = user.team;

}

</script>

</body>
</html>
