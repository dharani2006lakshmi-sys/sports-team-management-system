<!DOCTYPE html>
<html>
<head>
<title>Player Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f6f9;
}

/* HEADER */

.header{
background:#2563eb;
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header button{
background:white;
color:#2563eb;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

/* MAIN AREA */

.container{
display:flex;
justify-content:center;
align-items:center;
height:85vh;
}

/* PROFILE CARD */

.profile-card{
background:white;
padding:30px;
width:400px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.profile-card h2{
text-align:center;
margin-bottom:20px;
}

.profile-card input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

/* BUTTON */

.save-btn{
width:100%;
margin-top:10px;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.save-btn:hover{
background:#1e40af;
}

.note{
font-size:12px;
color:#777;
margin-top:5px;
text-align:center;
}

</style>

</head>

<body>

<div class="header">

<h3>Player Dashboard</h3>

<button onclick="history.back()">⬅ Back</button>

</div>


<div class="container">

<div class="profile-card">

<h2>Player Profile</h2>

<input id="name" placeholder="Player Name">

<input id="age" placeholder="Age">

<input id="position" placeholder="Playing Position">

<input id="team" placeholder="Team Name">

<button class="save-btn" onclick="saveProfile()">Save Profile</button>

<p class="note">Profile can only be edited once.</p>

</div>

</div>


<script>

function saveProfile(){

let name=document.getElementById("name").value;

if(name==""){
alert("Please fill your profile details.");
return;
}

alert("Profile saved successfully. Editing disabled.");

document.getElementById("name").disabled=true;
document.getElementById("age").disabled=true;
document.getElementById("position").disabled=true;
document.getElementById("team").disabled=true;

}

</script>

</body>
</html>
